<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="parrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066cc"/>
    </marker>
    <marker id="garrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Forward flow — top row: Idea through Plan -->
  <rect x="30" y="40" width="80" height="44" rx="8" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#555">Idea</text>
  <text x="70" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <line x1="112" y1="62" x2="128" y2="62" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="130" y="40" width="80" height="44" rx="8" fill="#dde5ed" stroke="#bcc8d8" stroke-width="1"/>
  <text x="170" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#444">Seed</text>
  <text x="170" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <line x1="212" y1="62" x2="228" y2="62" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="230" y="40" width="90" height="44" rx="8" fill="#ccdae8" stroke="#a8b8cc" stroke-width="1"/>
  <text x="275" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Research</text>
  <text x="275" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <line x1="322" y1="62" x2="338" y2="62" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="340" y="40" width="80" height="44" rx="8" fill="#b8cce0" stroke="#90a8c0" stroke-width="1"/>
  <text x="380" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Define</text>
  <text x="380" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <line x1="422" y1="62" x2="438" y2="62" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="440" y="40" width="80" height="44" rx="8" fill="#a0bcd8" stroke="#7898b8" stroke-width="1"/>
  <text x="480" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#222">Design</text>
  <text x="480" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <line x1="522" y1="62" x2="538" y2="62" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="540" y="40" width="70" height="44" rx="8" fill="#88aad0" stroke="#6088b0" stroke-width="1"/>
  <text x="575" y="67" text-anchor="middle" font-size="14" font-weight="600" fill="#222">Plan</text>
  <text x="575" y="98" text-anchor="middle" font-size="9" fill="#aaa">↻</text>

  <!-- Corner arrow down -->
  <line x1="610" y1="62" x2="640" y2="62" stroke="#0066cc" stroke-width="2"/>
  <line x1="640" y1="62" x2="640" y2="170" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <!-- Bottom row right to left: Implement, Ship, Value -->
  <rect x="580" y="172" width="110" height="48" rx="8" fill="#5588bb" stroke="#3368a0" stroke-width="1"/>
  <text x="635" y="201" text-anchor="middle" font-size="15" font-weight="600" fill="white">Implement</text>
  <text x="635" y="234" text-anchor="middle" font-size="9" fill="#88bbee">↻ QG at every boundary</text>

  <line x1="692" y1="196" x2="718" y2="196" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="720" y="172" width="70" height="48" rx="8" fill="#3366aa" stroke="#1a4488" stroke-width="1"/>
  <text x="755" y="201" text-anchor="middle" font-size="15" font-weight="600" fill="white">Ship</text>
  <text x="755" y="234" text-anchor="middle" font-size="9" fill="#88aadd">↻</text>

  <line x1="792" y1="196" x2="808" y2="196" stroke="#0066cc" stroke-width="2" marker-end="url(#parrow)"/>

  <rect x="810" y="172" width="75" height="48" rx="8" fill="#0066cc" stroke="none"/>
  <text x="847" y="201" text-anchor="middle" font-size="15" font-weight="700" fill="white">Value</text>

  <!-- Feedback loop: Value back to Idea -->
  <path d="M 847 222 L 847 290 Q 847 310 827 310 L 70 310 Q 50 310 50 290 L 50 86"
        fill="none" stroke="#888" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#garrow)"/>
  <text x="450" y="304" text-anchor="middle" font-size="13" fill="#888" font-style="italic">Feedback generates new seeds — the loop continues</text>

  <!-- DORA bracket -->
  <line x1="580" y1="260" x2="790" y2="260" stroke="#ccc" stroke-width="1"/>
  <text x="685" y="276" text-anchor="middle" font-size="10" fill="#aaa">DORA covers this</text>

  <!-- Each stage has OODA loops label -->
  <text x="320" y="118" text-anchor="middle" font-size="11" fill="#888">Each stage has its own OODA loop (↻)</text>
</svg>
