# Enforcement Registry — maps capabilities to their enforcement level
#
# What Problem: No central inventory of what The Agency enforces and how. Each
# capability has a ladder (doc → skill → tool → hookify-warn → hookify-block)
# but there's no way to audit which level each capability has actually reached.
#
# How & Why: Single YAML file listing every capability with its declared level
# and the artifacts that back it. The enforcement-audit tool validates this
# registry: does each capability actually have the artifacts its level claims?
# Level 1 needs docs, level 3 needs a tool, level 5 needs a hookify-block rule.
#
# Written: 2026-04-07 during devex Phase 3.2
#
# Enforcement levels:
#   1: documented (doc/CLAUDE.md reference exists)
#   2: +skill (discoverable via / autocomplete)
#   3: +tool (executable in agency/tools/)
#   4: +hookify-warn (warns on raw alternative)
#   5: +hookify-block (blocks raw alternative)
#
# Per-workstream overrides: each workstream can be at a different level
# for each capability via the `workstreams:` section. See A&D §4.

version: 1

# Per-workstream level overrides. If a workstream isn't listed for a capability,
# the capability's base level applies. Use sparingly — overrides are intentional
# rollouts ("active workstreams at higher enforcement, dormant at lower").
workstreams:
  devex:
    # devex agents must use git-safe-commit and follow the prefix conventions
    commit-message-format: 3
    pre-commit-checks: 3
  iscp:
    # iscp ships everything fully enforced
    commit-message-format: 3
    pre-commit-checks: 3
    dispatch-lifecycle: 3
    flag-capture: 3

capabilities:
  # ── Commit workflow ──
  commit-message-format:
    level: 3
    description: "Structured commit messages with workstream/agent prefix"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/git-safe-commit/SKILL.md"
      tool: "agency/tools/git-safe-commit"

  pre-commit-checks:
    level: 3
    description: "Quality gate before every commit"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/git-safe-commit/SKILL.md"
      tool: "agency/tools/commit-precheck"

  # ── Session management ──
  session-handoff:
    level: 3
    description: "Context bootstrap via handoff files with auto-archive"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/handoff/SKILL.md"
      tool: "agency/tools/handoff"

  # ── ISCP / dispatch ──
  dispatch-lifecycle:
    level: 3
    description: "Structured inter-agent messaging via dispatch tool"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/dispatch/SKILL.md"
      tool: "agency/tools/dispatch"

  flag-capture:
    level: 3
    description: "Quick-capture observations for later discussion"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/flag/SKILL.md"
      tool: "agency/tools/flag"

  # ── Quality gates ──
  quality-gate:
    level: 2
    description: "Multi-agent review at iteration/phase boundaries"
    artifacts:
      doc: "agency/REFERENCE/REFERENCE-QUALITY-GATE.md"
      skill: ".claude/skills/quality-gate/SKILL.md"

  iteration-complete:
    level: 2
    description: "QG + auto-commit at iteration boundary"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/iteration-complete/SKILL.md"

  phase-complete:
    level: 2
    description: "Deep QG + principal approval at phase boundary"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/phase-complete/SKILL.md"

  # ── Code review ──
  code-review:
    level: 3
    description: "7-agent parallel code review with confidence scoring"
    artifacts:
      doc: "agency/REFERENCE/REFERENCE-CODE-REVIEW-LIFECYCLE.md"
      skill: ".claude/skills/code-review/SKILL.md"
      tool: "agency/tools/code-review"

  # ── Test infrastructure ──
  test-isolation:
    level: 3
    description: "Test isolation for BATS — prevents git config pollution, HOME leakage, ISCP DB conflicts"
    artifacts:
      doc: "agency/workstreams/devex/devex-ad-20260407.md"
      tool: "agency/tools/lib/_test-isolation"
      template: "agency/templates/tests/test_helper.bash"

  test-scoping:
    level: 1
    description: "Convention-based file-to-test mapping"
    artifacts:
      doc: "agency/workstreams/devex/devex-plan-20260407.md"

  test-full-suite:
    level: 1
    description: "Docker + fallback full test suite runner"
    artifacts:
      doc: "agency/workstreams/devex/devex-plan-20260407.md"

  # ── Discussion protocol ──
  discussion-1b1:
    level: 1
    description: "One-by-one discussion protocol"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"

  # ── Workstream management ──
  workstream-create:
    level: 2
    description: "Scaffold workstream with artifacts, agents, worktree"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/workstream-create/SKILL.md"

  worktree-create:
    level: 3
    description: "Create isolated worktree with bootstrapped environment"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/worktree-create/SKILL.md"
      tool: "agency/tools/worktree-create"

  worktree-naming:
    level: 3
    description: "Workstream-agent naming convention with collapse rule (#166/#169)"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/worktree-create/SKILL.md"
      tool: "agency/tools/worktree-create"

  # ── Git discipline ──
  no-push-master:
    level: 1
    description: "Block direct pushes to origin/master (rule, not capability)"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"

  no-force-push:
    level: 1
    description: "Warn on any push, block force push (rule, not capability)"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"

  # ── Provenance ──
  provenance-headers:
    level: 1
    description: "What Problem / How & Why / Written headers on all code"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"

  # ── SPEC-PROVIDER dispatchers ──
  # Top-level wrappers that read agency.yaml provider config and exec the
  # corresponding provider tool. Consistent naming: {capability}-dispatcher.
  # Doc reference is README-ENFORCEMENT (not CLAUDE-THEAGENCY) since that's
  # the canonical SPEC-PROVIDER documentation home post-Day-32 R3.
  secret-dispatcher:
    level: 3
    description: "Secret management via SPEC-PROVIDER wrapper (vault, doppler, etc.)"
    artifacts:
      doc: "agency/README-ENFORCEMENT.md"
      skill: ".claude/skills/secret/SKILL.md"
      tool: "agency/tools/secret"

  preview-dispatcher:
    level: 3
    description: "Project preview via SPEC-PROVIDER wrapper (docker-compose, fly, etc.)"
    artifacts:
      doc: "agency/README-ENFORCEMENT.md"
      skill: ".claude/skills/preview/SKILL.md"
      tool: "agency/tools/preview"

  deploy-dispatcher:
    level: 3
    description: "Project deploy via SPEC-PROVIDER wrapper (fly, vercel, aws, etc.)"
    artifacts:
      doc: "agency/README-ENFORCEMENT.md"
      skill: ".claude/skills/deploy/SKILL.md"
      tool: "agency/tools/deploy"

  # ── Sandbox ──
  sandbox-workflow:
    level: 2
    description: "Per-engineer sandbox with activate/try/adopt lifecycle"
    artifacts:
      doc: "agency/CLAUDE-THEAGENCY.md"
      skill: ".claude/skills/sandbox-create/SKILL.md"
