---
# Subagent A — Framework tools
# v46.0 structural reset Phase 4 fan-out
# Authored: 2026-04-19 per Plan v4 §3 Phase 0c
#
# Scope: agency/tools/** (post-rename path). Pre-rename, this is claude/tools/**.
# Ownership priority: 1 (narrowest — wins on overlap against higher-priority agents).
#
# Files list is DECLARED partitioning rule; concrete file list generated by
# ref-inventory-gen at Phase 4 start and intersected with this manifest.

subagent: A
ownership_priority: 1

files:
  - agency/tools/**

excludes:
  - agency/tools/lib/_log-helper    # shared library (covered by E)
  - agency/workstreams/**           # workstreams owned by other subagents' scope
  - src/archive/tools/**            # archived — Principle 9 out-of-scope
  - agency/workstreams/*/history/**
  - agency/workstreams/*/transcripts/**

allowed_substitutions:
  - pattern: "claude/tools/"
    replacement: "agency/tools/"
  - pattern: "claude/lib/"
    replacement: "agency/lib/"

rejected_substitutions:
  # These MUST NOT change during the sweep — if they do, something is wrong
  - "\\.claude/"        # Anthropic Claude Code discovery dir
  - "CLAUDE\\.md"       # Root bootloader filename
  - "claude-code"       # Product reference
  - "claude\\.com"      # Company domain

expected_changes: null  # let Phase 4 determine actual count; non-zero expected
