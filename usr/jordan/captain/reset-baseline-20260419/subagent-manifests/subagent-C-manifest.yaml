---
# Subagent C — Tests
# v46.0 structural reset Phase 4 fan-out
# Authored: 2026-04-19 per Plan v4 §3 Phase 0c
#
# Scope: tests/** (excluding embedded fixture). Content: test file bodies
# that reference claude/... paths get rewritten to agency/... paths.
# Ownership priority: 3.

subagent: C
ownership_priority: 3

files:
  - tests/**/*.bats
  - tests/**/*.sh
  - tests/**/*.md
  - tests/**/*.yaml
  - tests/**/*.json

excludes:
  - test/test-agency-project/**    # fixture with embedded .git/ — Principle 9
  - src/archive/tests/**

allowed_substitutions:
  - pattern: "agency/tools/"
    replacement: "agency/tools/"
  - pattern: "agency/hooks/"
    replacement: "agency/hooks/"
  - pattern: "agency/hookify/"
    replacement: "agency/hookify/"
  - pattern: "agency/config/"
    replacement: "agency/config/"

rejected_substitutions:
  - "\\.claude/"
  - "CLAUDE\\.md"
  - "test/test-agency-project/"    # fixture paths must not be touched

expected_changes: null
