<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="sl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066cc"/>
    </marker>
    <marker id="sl-feedback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Forward flow -->
  <line x1="120" y1="100" x2="195" y2="100" stroke="#0066cc" stroke-width="3" marker-end="url(#sl-arrow)"/>
  <line x1="310" y1="100" x2="385" y2="100" stroke="#0066cc" stroke-width="3" marker-end="url(#sl-arrow)"/>
  <line x1="490" y1="100" x2="565" y2="100" stroke="#0066cc" stroke-width="3" marker-end="url(#sl-arrow)"/>
  <line x1="680" y1="100" x2="755" y2="100" stroke="#0066cc" stroke-width="3" marker-end="url(#sl-arrow)"/>

  <!-- Boxes -->
  <rect x="10" y="76" width="110" height="48" rx="8" fill="#0066cc"/>
  <text x="65" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">RESUME</text>

  <rect x="200" y="76" width="110" height="48" rx="8" fill="#0066cc"/>
  <text x="255" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">DIALOGUE</text>

  <rect x="390" y="76" width="100" height="48" rx="8" fill="#1a1a1a"/>
  <text x="440" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">EXECUTE</text>

  <rect x="570" y="76" width="110" height="48" rx="8" fill="#e8e8e8" stroke="#ccc"/>
  <text x="625" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#555">COMPACT</text>

  <rect x="760" y="76" width="30" height="48" rx="8" fill="#0066cc"/>
  <text x="775" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="white">END</text>

  <!-- Labels below -->
  <text x="65" y="145" text-anchor="middle" fill="#888" font-size="10">handoff + dispatches</text>
  <text x="255" y="145" text-anchor="middle" fill="#888" font-size="10">plan + direction</text>
  <text x="440" y="145" text-anchor="middle" fill="#888" font-size="10">phases + QG</text>
  <text x="625" y="145" text-anchor="middle" fill="#888" font-size="10">context overflow</text>
  <text x="775" y="145" text-anchor="middle" fill="#888" font-size="10">handoff</text>

  <!-- Feedback loop from END back to RESUME -->
  <path d="M 775 130 L 775 200 Q 775 220 755 220 L 65 220 Q 45 220 45 200 L 45 130"
        fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#sl-feedback)"/>
  <text x="400" y="240" text-anchor="middle" fill="#888" font-size="12" font-style="italic">Handoffs are the bridge — each session picks up where the last left off</text>

  <!-- Compact loop back to Execute -->
  <path d="M 600 76 Q 580 40 500 40 Q 420 40 420 76"
        fill="none" stroke="#888" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#sl-feedback)"/>
  <text x="510" y="35" text-anchor="middle" fill="#888" font-size="9">resume execution</text>
</svg>
