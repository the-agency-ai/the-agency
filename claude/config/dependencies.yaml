# Agency Framework Dependencies
# Machine-readable manifest for automated install + preflight checks

dependencies:
  required:
    - name: jq
      brew: jq
      apt: jq
      check: "command -v jq"
      reason: "JSON parsing in hooks and tools"
    - name: sqlite3
      brew: sqlite3
      apt: sqlite3
      check: "command -v sqlite3"
      reason: "ISCP database, telemetry, dispatch storage"
    - name: bats
      brew: bats-core
      apt: bats
      check: "command -v bats"
      reason: "Test runner for BATS test suites"
    - name: gh
      brew: gh
      apt: gh
      check: "command -v gh"
      reason: "GitHub CLI for PR, release, issue tools"
    - name: git
      brew: git
      apt: git
      check: "command -v git"
      reason: "Version control"
    - name: python3
      brew: python@3
      apt: python3
      check: "command -v python3"
      reason: "plan-capture.py hook, config tools"
    - name: shasum
      check: "command -v shasum"
      reason: "SHA-256 hashing for stage-hash, diff-hash, receipt chain"
    - name: curl
      check: "command -v curl"
      reason: "agency-bootstrap.sh, agency update --from-github"
  python:
    - pyyaml>=6.0
    - jsonschema>=4.0
  optional:
    - name: docker
      brew: docker
      apt: docker.io
      check: "command -v docker"
      reason: "Container-based test isolation"
    - name: node
      brew: node
      apt: nodejs
      check: "command -v node"
      reason: "TypeScript apps (mdslidepal-web)"
    - name: pnpm
      brew: pnpm
      check: "command -v pnpm"
      reason: "Package manager for TypeScript workspaces"
