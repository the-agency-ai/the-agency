# The Agency Configuration
# This file maps system identifiers to Agency concepts

# Map system usernames to principal names
# Used for: commit attribution, instruction routing, preferences
principals:
  # Format: system_username: principal_name
  # The principal_name should match a directory in usr/{principal_name}/
  jdm: jordan
  default: unknown  # Fallback if username not found

# Project settings
project:
  name: "My Project"
  timezone: "UTC"  # Used by ./tools/now

# Framework version tracking
framework:
  version: "2.0.0"
  installed_at: "2026-01-15T04:54:46+00:00"
  updated_at: "2026-04-01T00:00:00+00:00"
  source_commit: "self"

# Agent defaults
agents:
  default_model: "opus"  # opus, sonnet, haiku

# Collaboration settings
collaboration:
  auto_sync: true  # Automatically push collaboration files
  news_expiry_days: 7  # Mark old news as READ after N days

# Quality gate settings
quality:
  block_on_secrets: true
  block_on_console_log: false  # Warning only
  block_on_any_type: false     # Warning only
  require_issue_links_in_todos: false

# Development methodology
methodology:
  numbering: "phase.iteration"  # Phase X.Y format for commits and plans
  work_pattern: "discuss-plan-review-revise-finalize-implement"

# Sandbox — per-principal isolation
sandbox:
  principal_dirs: true  # Enable usr/{principal}/ structure

# Worktree management — enables parallel agent sessions
worktrees:
  enabled: true
  base_dir: ".claude/worktrees"  # Same path as EnterWorktree, but managed by Agency tools

# --- Plugin Providers ---
# Each section selects the active provider tool.
# Convention: {section}-{provider} or {section}-setup-{provider}
# Bundled defaults ship with every installation.

# Secrets management
secrets:
  provider: "vault"  # Default: vault. Alternatives: doppler, aws, 1password

# Terminal integration
terminal:
  provider: "ghostty"  # Default: ghostty. Alternatives: kitty, wezterm

# Platform setup (CLI tools, dependencies)
platform:
  provider: "auto"  # Auto-detect from OS. Override: macos, linux, windows

# Preview (local/remote previews)
preview:
  provider: "docker-compose"  # Default: docker-compose. Alternatives: fly, vercel, cloudflare

# Deploy (platform deployment)
deploy:
  provider: "fly"  # Default: fly. Alternatives: aws, vercel, cloudflare, railway

# Crawl (site content extraction)
crawl:
  provider: "webfetch"  # Default: webfetch (built-in). Alternatives: playwright, wget, scrapy
  sites: []  # Configure per-project: [{name, url, patterns}]

# Testing — declares test suites and how to run them
# test-run reads this section. Each suite has a name, command, and optional scope.
testing:
  provider: "multi"  # multi = run all configured suites
  suites:
    tools:
      command: "bats tests/tools/"
      description: "BATS tool tests (framework tools, ISCP)"

# Design system integration
design:
  provider: "figma"  # Default: figma. Alternatives: sketch, adobe

# Telemetry providers
telemetry:
  providers: ["log-helper", "jsonl"]  # log-helper = agency-service, jsonl = local file
