<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #4F46E5;
    }
    .status {
      padding: 8px 12px;
      background: #F3F4F6;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #D1FAE5;
      color: #065F46;
    }
    .status.disconnected {
      background: #FEE2E2;
      color: #991B1B;
    }
    .queue-info {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 12px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    .primary {
      background: #4F46E5;
      color: white;
    }
    .primary:hover {
      background: #4338CA;
    }
    .secondary {
      background: #E5E7EB;
      color: #374151;
    }
    .secondary:hover {
      background: #D1D5DB;
    }
    .shortcut {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 12px;
      text-align: center;
    }
    kbd {
      background: #F3F4F6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Agency Browser</h1>

  <div id="status" class="status disconnected">
    Checking AgencyBench connection...
  </div>

  <div id="queue-info" class="queue-info">
    Queued items: <span id="queue-count">0</span>
  </div>

  <div class="actions">
    <button id="capture-selection" class="primary">Capture Selection</button>
    <button id="capture-page" class="secondary">Capture Page</button>
    <button id="capture-screenshot" class="secondary">Screenshot</button>
    <button id="clear-queue" class="secondary">Clear Queue</button>
  </div>

  <div class="shortcut">
    Quick capture: <kbd>Cmd</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
