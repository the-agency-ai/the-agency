  <!-- Edge labels -->
  <text x="140" y="190" text-anchor="middle" font-size="13" fill="#888" transform="rotate(-56, 140, 190)">trade-off</text>
  <text x="360" y="190" text-anchor="middle" font-size="13" fill="#888" transform="rotate(56, 360, 190)">trade-off</text>
  <text x="250" y="368" text-anchor="middle" font-size="13" fill="#888">trade-off</text>
</svg>
