<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Triangle -->
  <polygon points="250,40 60,350 440,350" fill="none" stroke="#333" stroke-width="3" stroke-linejoin="round"/>

  <!-- Vertex labels -->
  <text x="250" y="28" text-anchor="middle" font-size="28" font-weight="700" fill="#333">Fast</text>
  <text x="40" y="385" text-anchor="middle" font-size="28" font-weight="700" fill="#333">Good</text>
  <text x="460" y="385" text-anchor="middle" font-size="28" font-weight="700" fill="#333">Cheap</text>

  <!-- Center text -->
