<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066cc"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Step 1: Markdown -->
  <rect x="20" y="60" width="150" height="80" rx="8" fill="#e3f2fd" stroke="#0066cc" stroke-width="1.5"/>
  <text x="95" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#0066cc">Markdown</text>
  <text x="95" y="118" text-anchor="middle" font-size="12" fill="#666">workshop.md</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="220" y2="100" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Build -->
  <rect x="220" y="60" width="150" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="295" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#9c27b0">Build</text>
  <text x="295" y="118" text-anchor="middle" font-size="12" fill="#666">theme + template</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="100" x2="420" y2="100" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Output -->
  <rect x="420" y="60" width="150" height="80" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="495" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#2e7d32">Output</text>
  <text x="495" y="118" text-anchor="middle" font-size="12" fill="#666">self-contained dir</text>

  <!-- Arrow 3 -->
  <line x1="570" y1="100" x2="620" y2="100" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Serve -->
  <rect x="620" y="60" width="150" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="695" y="95" text-anchor="middle" font-size="16" font-weight="600" fill="#e65100">Serve</text>
  <text x="695" y="118" text-anchor="middle" font-size="12" fill="#666">sirv → browser</text>

  <!-- Arrow 4 -->
  <line x1="770" y1="100" x2="820" y2="100" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Present -->
  <rect x="820" y="70" width="60" height="60" rx="30" fill="#0066cc"/>
  <text x="850" y="106" text-anchor="middle" font-size="22" fill="white">🎯</text>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">mdslidepal Workflow</text>
  <text x="450" y="180" text-anchor="middle" font-size="13" fill="#999">One command: markdown → slides in the browser</text>
</svg>
