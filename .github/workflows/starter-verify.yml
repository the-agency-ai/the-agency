name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required framework files
        run: |
          echo "Checking required files..."
          required_files=(
            "CLAUDE.md"
            "README.md"
            "LICENSE"
            ".claude/settings.json"
            "claude/agents/captain/agent.md"
            "claude/config/agency.yaml"
            "claude/CLAUDE-THEAGENCY.md"
            "claude/tools/agency-init"
            "claude/tools/handoff"
            "claude/tools/git-commit"
            "claude/hooks/ref-injector.sh"
          )

          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -e "$f" ]; then
              echo "Missing: $f"
              missing=1
            else
              echo "Found: $f"
            fi
          done

          if [ $missing -eq 1 ]; then
            exit 1
          fi

      - name: Verify tools with shebangs are executable
        run: |
          echo "Checking tool permissions..."
          fail=0
          for tool in claude/tools/*; do
            if [ -f "$tool" ] && head -1 "$tool" | grep -q '^#!'; then
              if [ ! -x "$tool" ]; then
                echo "Not executable: $tool"
                fail=1
              fi
            fi
          done
          if [ $fail -eq 1 ]; then
            exit 1
          fi
          echo "All shebang tools are executable"

      - name: Verify hooks are executable
        run: |
          for hook in claude/hooks/*.sh; do
            if [ -f "$hook" ] && [ ! -x "$hook" ]; then
              echo "Not executable: $hook"
              exit 1
            fi
          done
          echo "All hooks are executable"

      - name: Verify skills exist
        run: |
          count=$(find .claude/skills -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "Found $count skills"
          if [ "$count" -lt 30 ]; then
            echo "Expected at least 30 skills, found $count"
            exit 1
          fi
