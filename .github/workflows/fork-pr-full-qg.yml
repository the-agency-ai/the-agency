# What Problem: Community contributors (Ring 3 — fork PRs) need a full
# quality gate before their code can be merged. These contributors don't
# have direct repo access, so CI is the only automated validation layer.
#
# How & Why: Runs the complete BATS test suite (skills + tools) plus config
# validation and shell syntax checks. Only triggers on PRs from forks
# (head.repo.full_name != repository), so core team PRs skip this heavier
# gate. BATS is installed via apt for simplicity — no Node/npm needed.
#
# Written: 2026-04-12 during devex CI rework for contribution model

name: Full QG Gate (Fork PRs)

on:
  pull_request:
    branches: [main]

jobs:
  full-qg:
    # Only run on PRs from forks (community contributors / Ring 3)
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run skill validation tests
        run: bats tests/skills/skill-validation.bats

      - name: Run tool tests
        run: |
          for f in tests/tools/*.bats; do
            echo "Running: $f"
            bats "$f" || exit 1
          done

      - name: Validate JSON configs
        run: |
          for f in .claude/settings.json claude/config/manifest.json registry.json; do
            [ -f "$f" ] && jq . "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Validate shell tool syntax
        run: |
          for tool in claude/tools/*; do
            if [ -f "$tool" ] && head -1 "$tool" | grep -q '^#!/.*bash'; then
              bash -n "$tool" || { echo "Syntax error in $tool"; exit 1; }
            fi
          done
