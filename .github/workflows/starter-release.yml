# This workflow is for the-agency-starter repo
# It gets synced via ./tools/starter-release
#
# Creates a GitHub Release when a version tag is pushed

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from $PREV_TAG to ${{ github.ref_name }}"
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          else
            echo "First release, using all commits"
            NOTES=$(git log --pretty=format:"- %s")
          fi

          # Write to file for multi-line handling
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body_path: release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
