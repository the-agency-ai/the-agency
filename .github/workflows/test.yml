name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run skill validation tests
        run: bats tests/skills/skill-validation.bats

      - name: Run tool tests
        run: bats tests/tools/git-operations.bats

      - name: Validate JSON configs
        run: |
          jq . .claude/settings.json > /dev/null
          jq . claude/config/manifest.json > /dev/null
          jq . registry.json > /dev/null

      - name: Validate shell tools
        run: |
          for tool in claude/tools/*; do
            if [ -f "$tool" ] && head -1 "$tool" | grep -q '^#!/.*bash'; then
              bash -n "$tool" || { echo "Syntax error in $tool"; exit 1; }
            fi
          done
          echo "All shell tools pass syntax check"
